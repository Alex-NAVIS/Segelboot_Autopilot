<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP LittleFS Manager</title>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f1218; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: start; min-height: 100vh; padding: 2rem; }
    h1 { color: #00bcd4; margin-bottom: 0.5rem; }
    p { color: #aaa; font-size: 0.9rem; margin-bottom: 2rem; text-align: center; max-width: 500px; }
    #navbar { width: 100%; max-width: 450px; display: flex; justify-content: flex-start; margin-bottom: 1rem; }
    
    form, .dashboard { background: #1a1f28; padding: 2rem; border-radius: 12px; box-shadow: 0 0 20px rgba(0,180,212,0.15); display: flex; flex-direction: column; gap: 1.5rem; width: 100%; max-width: 450px; margin-bottom: 2rem; box-sizing: border-box; }
    
    label { font-weight: bold; font-size: 0.85rem; color: #00bcd4; }
    input[type="text"], input[type="file"] { padding: 0.6rem; border-radius: 6px; border: 1px solid #252a38; background: #252a38; color: #e0e0e0; width: 100%; box-sizing: border-box; }
    
    input[type="submit"] { background: #00bcd4; color: #0f1218; border: none; padding: 0.8rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; }
    input[type="submit"]:hover { background: #00e5ff; transform: translateY(-1px); }
    
    .navbtn { display: inline-block; background: linear-gradient(135deg, #1a2a35 0%, #003d52 100%); color: #00d4ff; border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 8px; padding: 8px 18px; text-decoration: none; font-size: 0.85rem; font-weight: bold; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .navbtn:hover { background: #00bcd4; color: #0f1218; border-color: #00e5ff; box-shadow: 0 0 12px rgba(0, 188, 212, 0.4); transform: translateY(-1px); }
    
    #status { margin-top: 0.5rem; font-weight: bold; text-align: center; font-size: 0.9rem; }
    #progressBar { width: 100%; height: 10px; background: #252a38; border-radius: 5px; overflow: hidden; }
    #progress { height: 100%; width: 0%; background: #00bcd4; transition: width 0.3s ease; }
    
    .file-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #252a38; font-size: 0.85rem; }
    .file-name { color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; }
    .file-size { color: #00bcd4; font-family: monospace; }
    .storage-bar-bg { width: 100%; height: 6px; background: #252a38; border-radius: 3px; margin-top: 5px; }
    .storage-bar-fill { height: 100%; background: #00bcd4; border-radius: 3px; }
    
    footer { margin: 40px 0 20px 0; padding-top: 10px; border-top: 1px solid #005566; color: #00b8d4; font-size: 0.9em; text-align: center; opacity: 0.9; width: 100%; max-width: 450px; }
  </style>
</head>
<body>

  <div id="navbar">
    <a href="index.html" class="navbtn">← Main Menu</a>
  </div>

  <h1>ESP LittleFS Manager</h1>
  <p>Verwalten Sie die Dateien auf Ihrem Autopilot-System.</p>

  <form id="uploadForm">
    <label for="folderInput">Zielpfad / Unterordner</label>
    <input type="text" id="folderInput" placeholder="z.B. js/ (optional)" value="">

    <label for="fileInput">Datei auswählen</label>
    <input type="file" id="fileInput" name="file" required>

    <input type="submit" value="Hochladen">

    <div id="progressBar"><div id="progress"></div></div>
    <div id="status">Bereit</div>
  </form>

  <div class="dashboard">
    <label>Speicherbelegung</label>
    <div id="storageText" style="font-size: 0.8rem; color: #aaa;">Lade Daten...</div>
    <div class="storage-bar-bg"><div id="storageBar" class="storage-bar-fill" style="width: 0%"></div></div>
    
    <label style="margin-top: 1rem;">Dateien im System</label>
    <div id="fileList">
      <!-- Wird per JS befüllt -->
    </div>
  </div>

  <footer>
    <strong>NAVIS & Eike File Upload v1.1</strong><br>
    Entwickelt von den Partnern <span style="color:#00ffff;">Eike</span> & <span style="color:#00ffff;">NAVIS</span>.<br>
    © 2026 – System ESP32
  </footer>

  <script>
    const form = document.getElementById('uploadForm');
    const statusDiv = document.getElementById('status');
    const progressBar = document.getElementById('progress');
    const fileListDiv = document.getElementById('fileList');
    const storageText = document.getElementById('storageText');
    const storageBar = document.getElementById('storageBar');

    function loadFileSystemInfo() {
      fetch('/list_files')
        .then(res => {
          if(!res.ok) throw new Error("Konnte Liste nicht laden");
          return res.json();
        })
        .then(data => {
          fileListDiv.innerHTML = "";
          const fsInfo = data.pop(); 
          const usedKB = (fsInfo.fs_used / 1024).toFixed(1);
          const totalKB = (fsInfo.fs_total / 1024).toFixed(1);
          const percent = (fsInfo.fs_used / fsInfo.fs_total * 100).toFixed(1);

          storageText.innerText = `${usedKB} KB von ${totalKB} KB belegt (${percent}%)`;
          storageBar.style.width = percent + "%";

          if(data.length === 0) {
            fileListDiv.innerHTML = '<div style="color:#666; font-style:italic">Keine Dateien gefunden.</div>';
          }

          data.forEach(file => {
            const sizeKB = (file.size / 1024).toFixed(1);
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `<span class="file-name">${file.name}</span><span class="file-size">${sizeKB} KB</span>`;
            fileListDiv.appendChild(item);
          });
        })
        .catch(err => {
          console.error(err);
          storageText.innerText = "Fehler beim Laden der Dateiliste";
        });
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const file = document.getElementById('fileInput').files[0];
      if (!file) return;

      const folder = document.getElementById('folderInput').value.trim();
      let cleanFolder = folder;
      if (cleanFolder && !cleanFolder.endsWith('/')) cleanFolder += '/';
      const fullPath = cleanFolder + file.name;

      const formData = new FormData();
      formData.append('file', file);
      formData.append('path', fullPath); 

      statusDiv.innerText = "⏳ Upload läuft...";
      statusDiv.style.color = "#00bcd4";
      progressBar.style.width = "0%";

      fetch('/upload', {
        method: 'POST',
        body: formData
      })
      .then(response => {
        if(response.status === 507) throw new Error('Speicher voll!');
        if(!response.ok) throw new Error('Server-Fehler: ' + response.status);
        return response.text();
      })
      .then(data => {
        statusDiv.innerText = "✅ Erfolgreich: " + file.name;
        statusDiv.style.color = "#4caf50";
        progressBar.style.width = "100%";
        form.reset();
        setTimeout(loadFileSystemInfo, 500);
      })
      .catch(err => {
        statusDiv.innerText = "❌ " + err.message;
        statusDiv.style.color = "#ff5252";
        progressBar.style.width = "0%";
      });
    });

    loadFileSystemInfo();
  </script>
</body>
</html>
